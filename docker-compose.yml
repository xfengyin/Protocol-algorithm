version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - protocol-network

  # Jupyter notebook for Python development
  jupyter:
    image: jupyter/scipy-notebook:latest
    ports:
      - "8888:8888"
    volumes:
      - ./python/examples:/home/jovyan/work/examples
      - ./viz:/home/jovyan/work/viz
    environment:
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - protocol-network

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - protocol-network

volumes:
  redis-data:

networks:
  protocol-network:
    driver: bridge
