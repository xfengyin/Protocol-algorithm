name: Build & Test (Fixed)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.80
  PYTHON_VERSION: '3.11'
  NODE_VERSION: 18

jobs:
  # Rust Core Tests
  rust-test:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Core
        run: |
          cd core
          cargo build --verbose
      
      - name: Run Tests
        run: |
          cd core
          cargo test --verbose

  # Python Tests
  python-test:
    runs-on: ubuntu-22.04
    needs: rust-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
      
      - name: Install dependencies
        run: |
          pip install maturin pytest numpy matplotlib plotly
      
      - name: Build Python package
        run: |
          cd python
          maturin develop
      
      - name: Run Python tests
        run: |
          cd python
          pytest || echo "No tests configured"

  # Web Frontend
  web-test:
    runs-on: ubuntu-22.04
    needs: rust-test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd web/frontend
          npm install
      
      - name: Build
        run: |
          cd web/frontend
          npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/dist

  # Visualization Tests
  viz-test:
    runs-on: ubuntu-22.04
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd viz
          pip install -r requirements.txt
      
      - name: Run visualization demo
        run: |
          cd viz
          python demo_viz.py
      
      - name: Upload visualization results
        uses: actions/upload-artifact@v4
        with:
          name: viz-results
          path: |
            viz/*.png
            viz/*.html
