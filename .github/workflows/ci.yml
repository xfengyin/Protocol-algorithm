name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: 1.85
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Rust Core Tests
  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
      
      - name: Cache cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build Core
        run: |
          cd core
          cargo build --verbose
      
      - name: Run Tests
        run: |
          cd core
          cargo test --verbose
      
      - name: Run Benchmarks
        run: |
          cd core
          cargo bench -- --test

  # Python Bindings
  python-test:
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install dependencies
        run: |
          pip install maturin pytest numpy matplotlib plotly
      
      - name: Build Python package
        run: |
          cd python
          maturin develop
      
      - name: Run Python tests
        run: |
          cd python
          pytest || echo "No tests yet"
      
      - name: Test example
        run: |
          cd python
          python examples/basic_example.py

  # Web Frontend
  web-test:
    runs-on: ubuntu-latest
    needs: rust-test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Install dependencies
        run: |
          cd web/frontend
          npm ci
      
      - name: Lint
        run: |
          cd web/frontend
          npm run lint || echo "Lint not configured"
      
      - name: Build
        run: |
          cd web/frontend
          npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web/dist

  # Build Web Backend
  web-backend:
    runs-on: ubuntu-latest
    needs: [rust-test, python-test]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build Web Backend
        run: |
          cd web
          cargo build --release

  # Visualization Tests
  viz-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd viz
          pip install -r requirements.txt
      
      - name: Run visualization demo
        run: |
          cd viz
          python demo_viz.py
      
      - name: Upload visualization results
        uses: actions/upload-artifact@v4
        with:
          name: viz-results
          path: |
            viz/*.png
            viz/*.html

  # Build Python Package for PyPI
  build-python-package:
    runs-on: ubuntu-latest
    needs: [rust-test, python-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build wheels
        run: |
          cd python
          pip install maturin
          maturin build --release
      
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels
          path: python/target/wheels

  # Deploy to GitHub Pages
  deploy-pages:
    runs-on: ubuntu-latest
    needs: [web-test]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: Build
        run: |
          cd web/frontend
          npm ci
          npm run build
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          force_orphan: true

  # Create Release
  create-release:
    runs-on: ubuntu-latest
    needs: [rust-test, python-test, web-test, viz-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            python/target/wheels/*.whl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
